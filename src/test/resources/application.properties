# Test-specific overrides
# Testcontainers will provide dynamic datasource properties
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT (same as main)
jwt.secret=jbfh-secret-key-2026-very-secure-and-long-enough-for-hs256-algorithm
jwt.expiration=86400000

# Logging
logging.level.com.par.jbfh=DEBUG